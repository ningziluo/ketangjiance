<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0">
    <title>平均数 · 课堂分层检测</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(145deg, #e8f5e9 0%, #c8e6c9 100%);
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Noto Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .container {
            width: 100%;
            max-width: 750px;
            background: #ffffff;
            border-radius: 48px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15), 0 0 0 1px rgba(46, 125, 50, 0.2);
            padding: 28px 25px 30px;
            transition: all 0.2s ease;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 22px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .title {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .title h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #2e7d32, #1b5e20);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
            margin: 0;
        }
        .badge {
            background: #ffb74d;
            color: #3e2723;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 0.8px;
            background: #ffcc80;
            box-shadow: 0 4px 8px rgba(255, 152, 0, 0.3);
            white-space: nowrap;
        }
        .refresh-btn {
            background: #ffffff;
            border: 2px solid #4caf50;
            color: #2e7d32;
            padding: 10px 22px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: all 0.25s;
            background: #f1f8e9;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .refresh-btn:hover {
            background: #4caf50;
            color: white;
            border-color: #2e7d32;
            box-shadow: 0 8px 18px rgba(46,125,50,0.25);
            transform: translateY(-1px);
        }
        .refresh-btn:active {
            transform: translateY(1px);
        }
        .quiz-panel {
            background: #f9fbe7;
            border-radius: 32px;
            padding: 20px 18px;
            margin: 15px 0 20px;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.03), 0 10px 20px -12px rgba(0,0,0,0.1);
        }
        .question-card {
            background: white;
            border-radius: 24px;
            padding: 18px 18px 14px;
            margin-bottom: 20px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.04);
            border: 1px solid rgba(76,175,80,0.15);
            transition: 0.2s;
            position: relative;
        }
        .question-header {
            display: flex;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }
        .q-num {
            background: #2e7d32;
            color: white;
            font-weight: 700;
            font-size: 0.9rem;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            background: linear-gradient(135deg, #43a047, #2e7d32);
            box-shadow: 0 4px 8px rgba(46,125,50,0.3);
        }
        .q-type {
            font-size: 0.8rem;
            font-weight: 600;
            padding: 4px 14px;
            border-radius: 30px;
            background: #e8f5e9;
            color: #1b5e20;
            letter-spacing: 0.4px;
        }
        .q-type.comprehensive {
            background: #fff3e0;
            color: #e65100;
        }
        .q-type.extended {
            background: #f3e5f5;
            color: #6a1b9a;
        }
        .question-text {
            font-size: 1.08rem;
            font-weight: 600;
            color: #1e293b;
            line-height: 1.5;
            margin-bottom: 16px;
            word-break: break-word;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .option-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #f5f5f5;
            padding: 10px 16px;
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
            font-weight: 500;
            color: #2c3e50;
        }
        .option-item:hover {
            background: #e8f5e9;
            border-color: #a5d6a7;
        }
        .option-item input[type="radio"] {
            appearance: none;
            width: 20px;
            height: 20px;
            border: 2px solid #9e9e9e;
            border-radius: 50%;
            margin: 0;
            position: relative;
            cursor: pointer;
            transition: 0.2s;
            background: white;
        }
        .option-item input[type="radio"]:checked {
            border-color: #2e7d32;
            background: #2e7d32;
            box-shadow: inset 0 0 0 4px white;
        }
        .option-item.correct-highlight {
            background: #e8f5e9;
            border-color: #4caf50;
            box-shadow: 0 0 0 3px rgba(76,175,80,0.25);
        }
        .option-item.wrong-highlight {
            background: #ffebee;
            border-color: #ef5350;
            box-shadow: 0 0 0 3px rgba(244,67,54,0.2);
        }
        .option-item.disabled {
            pointer-events: none;
            opacity: 0.8;
        }
        .feedback-icon {
            margin-left: auto;
            font-size: 1.2rem;
            font-weight: bold;
        }
        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 20px 0 10px;
            flex-wrap: wrap;
        }
        .submit-btn {
            background: #2e7d32;
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.15rem;
            letter-spacing: 1px;
            cursor: pointer;
            background: linear-gradient(135deg, #43a047, #1b5e20);
            box-shadow: 0 8px 18px rgba(46,125,50,0.4);
            transition: all 0.25s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .submit-btn:hover {
            background: linear-gradient(135deg, #4caf50, #2e7d32);
            box-shadow: 0 12px 24px rgba(46,125,50,0.5);
            transform: translateY(-2px);
        }
        .submit-btn:active {
            transform: translateY(0);
        }
        .submit-btn:disabled {
            opacity: 0.6;
            box-shadow: none;
            transform: none;
            pointer-events: none;
        }
        .result-area {
            background: #ffffff;
            border-radius: 28px;
            padding: 22px 20px;
            margin-top: 15px;
            box-shadow: 0 15px 30px -10px rgba(0,0,0,0.15);
            border: 2px solid #c8e6c9;
            text-align: center;
            animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .score-circle {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #2e7d32, #1b5e20);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .recommendation {
            background: #fff8e1;
            border-radius: 20px;
            padding: 14px 18px;
            margin-top: 18px;
            font-weight: 600;
            color: #3e2723;
            border-left: 6px solid #ffa000;
            text-align: left;
        }
        .recommendation span {
            font-weight: 800;
            font-size: 1.1rem;
        }
        .layer-tag {
            display: inline-block;
            padding: 4px 16px;
            border-radius: 30px;
            background: #ffb74d;
            color: #3e2723;
            font-weight: 700;
            margin: 0 4px;
        }
        .footer-note {
            color: #5f6b5f;
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
            font-weight: 500;
        }
        @media (max-width: 500px) {
            .container {
                padding: 20px 15px;
            }
            .title h1 {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">
                <h1>🌱 平均数·分层检测</h1>
                <span class="badge">课堂巩固</span>
            </div>
            <button class="refresh-btn" id="refreshBtn" title="更换题目">
                🔄 刷新题目
            </button>
        </div>

        <div class="quiz-panel" id="quizPanel">
            <!-- 动态生成题目 -->
        </div>

        <div class="action-buttons">
            <button class="submit-btn" id="submitBtn">
                ✅ 提交检测
            </button>
        </div>

        <div id="resultContainer" style="display: none;">
            <!-- 结果展示区域 -->
        </div>
        <div class="footer-note">
            💡 完成检测后，系统会根据正确率推荐分层作业
        </div>
    </div>

    <script>
        (function() {
            // ---------- 题库 ----------
            const questionBank = {
                basic: [
                    {
                        id: 'b1',
                        type: 'basic',
                        typeName: '基础',
                        question: '环保小队4人收集空水瓶：小红14个、小兰12个、小亮11个、小明15个。平均每人收集多少个？',
                        options: ['A. 12个', 'B. 13个', 'C. 14个', 'D. 15个'],
                        answer: 1,
                        explanation: '(14+12+11+15)÷4 = 52÷4 = 13（个）'
                    },
                    {
                        id: 'b2',
                        type: 'basic',
                        typeName: '基础',
                        question: '一组数据：8, 12, 10, 14，平均数是多少？',
                        options: ['A. 10', 'B. 11', 'C. 12', 'D. 13'],
                        answer: 1,
                        explanation: '(8+12+10+14)÷4 = 44÷4 = 11'
                    },
                    {
                        id: 'b3',
                        type: 'basic',
                        typeName: '基础',
                        question: '5位同学的身高分别是142cm、138cm、145cm、140cm、135cm，平均身高是多少？',
                        options: ['A. 138cm', 'B. 140cm', 'C. 142cm', 'D. 144cm'],
                        answer: 1,
                        explanation: '总和700cm，700÷5=140cm'
                    },
                    {
                        id: 'b4',
                        type: 'basic',
                        typeName: '基础',
                        question: '判断题：一组数据的平均数一定等于这组数据中的某个数。',
                        options: ['A. 正确', 'B. 错误'],
                        answer: 1,
                        explanation: '平均数可能不在原始数据中，比如环保小队4人的平均数是13，但没有人恰好收集13个。'
                    }
                ],
                comprehensive: [
                    {
                        id: 'c1',
                        type: 'comprehensive',
                        typeName: '综合',
                        question: '小明前三次数学测验平均分是92分，他希望四次平均分达到94分，第四次至少要考多少分？',
                        options: ['A. 96分', 'B. 98分', 'C. 100分', 'D. 94分'],
                        answer: 2,
                        explanation: '94×4 - 92×3 = 376 - 276 = 100（分）'
                    },
                    {
                        id: 'c2',
                        type: 'comprehensive',
                        typeName: '综合',
                        question: '环保小队原来4人平均每人收集13个空水瓶，加入一名新队员后，5人平均每人收集12个。新队员收集了多少个？',
                        options: ['A. 8个', 'B. 10个', 'C. 12个', 'D. 14个'],
                        answer: 0,
                        explanation: '12×5 - 13×4 = 60 - 52 = 8（个）'
                    },
                    {
                        id: 'c3',
                        type: 'comprehensive',
                        typeName: '综合',
                        question: '某小组5名同学的跳绳成绩：80下、95下、75下、90下、85下，平均每人跳了多少下？',
                        options: ['A. 82下', 'B. 85下', 'C. 87下', 'D. 90下'],
                        answer: 1,
                        explanation: '(80+95+75+90+85)÷5 = 425÷5 = 85（下）'
                    },
                    {
                        id: 'c4',
                        type: 'comprehensive',
                        typeName: '综合',
                        question: '四（1）班第一组5人平均身高142厘米，第二组6人平均身高139厘米。小军是第一组最矮的，小丽是第二组最高的。下面哪个说法正确？',
                        options: ['A. 小军一定比小丽高', 'B. 小丽一定比小军高', 'C. 无法确定谁更高', 'D. 他们一样高'],
                        answer: 2,
                        explanation: '平均数不能代表个体，小军可能很矮，小丽可能很高，无法比较。'
                    }
                ],
                extended: [
                    {
                        id: 'e1',
                        type: 'extended',
                        typeName: '拓展',
                        question: '小红、小兰、小亮三人平均收集12个水瓶，小红和小兰的平均数是11个，小亮收集了多少个？',
                        options: ['A. 13个', 'B. 14个', 'C. 15个', 'D. 16个'],
                        answer: 1,
                        explanation: '12×3 - 11×2 = 36 - 22 = 14（个）'
                    },
                    {
                        id: 'e2',
                        type: 'extended',
                        typeName: '拓展',
                        question: '一组数据的最大值是18，最小值是10，且这组数据中的数各不相同。平均数可能是下面哪个数？',
                        options: ['A. 9', 'B. 18', 'C. 12', 'D. 10'],
                        answer: 2,
                        explanation: '当数据各不相同时，平均数一定大于最小值且小于最大值。9小于10，18等于最大值，10等于最小值，只有12在10和18之间。'
                    },
                    {
                        id: 'e3',
                        type: 'extended',
                        typeName: '拓展',
                        question: '5个数的平均数是20，如果其中一个数增加5，那么新的平均数会？',
                        options: ['A. 增加5', 'B. 增加1', 'C. 不变', 'D. 增加0.5'],
                        answer: 1,
                        explanation: '总数增加5，平均分到5个数，每个增加1，所以平均数增加1。'
                    }
                ]
            };

            let currentQuestions = [];
            let isSubmitted = false;

            const quizPanel = document.getElementById('quizPanel');
            const submitBtn = document.getElementById('submitBtn');
            const refreshBtn = document.getElementById('refreshBtn');
            const resultContainer = document.getElementById('resultContainer');

            function selectRandomQuestions() {
                const selected = [];
                const basicPool = [...questionBank.basic];
                shuffleArray(basicPool);
                selected.push(...basicPool.slice(0, 2));

                const compPool = [...questionBank.comprehensive];
                shuffleArray(compPool);
                selected.push(...compPool.slice(0, 2));

                const extPool = [...questionBank.extended];
                shuffleArray(extPool);
                selected.push(...extPool.slice(0, 1));

                shuffleArray(selected);
                return selected;
            }

            function shuffleArray(arr) {
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
            }

            function renderQuestions() {
                quizPanel.innerHTML = '';
                currentQuestions.forEach((q, index) => {
                    const card = document.createElement('div');
                    card.className = 'question-card';
                    card.dataset.questionIndex = index;

                    let typeClass = '';
                    if (q.type === 'comprehensive') typeClass = 'comprehensive';
                    else if (q.type === 'extended') typeClass = 'extended';

                    card.innerHTML = `
                        <div class="question-header">
                            <span class="q-num">${index + 1}</span>
                            <span class="q-type ${typeClass}">${q.typeName}</span>
                        </div>
                        <div class="question-text">${q.question}</div>
                        <div class="options" id="options-${index}">
                            ${q.options.map((opt, optIndex) => `
                                <label class="option-item" data-opt-index="${optIndex}">
                                    <input type="radio" name="q${index}" value="${optIndex}">
                                    ${opt}
                                </label>
                            `).join('')}
                        </div>
                    `;
                    quizPanel.appendChild(card);
                });

                document.querySelectorAll('.option-item').forEach(item => {
                    item.addEventListener('click', function(e) {
                        if (isSubmitted) return;
                        const radio = this.querySelector('input[type="radio"]');
                        if (radio) {
                            radio.checked = true;
                            const parent = this.closest('.options');
                            parent.querySelectorAll('.option-item').forEach(opt => opt.style.background = '#f5f5f5');
                            this.style.background = '#e8f5e9';
                            this.style.borderColor = '#4caf50';
                        }
                    });
                });
            }

            function resetQuiz() {
                isSubmitted = false;
                currentQuestions = selectRandomQuestions();
                renderQuestions();
                resultContainer.style.display = 'none';
                resultContainer.innerHTML = '';
                submitBtn.disabled = false;
                submitBtn.innerHTML = '✅ 提交检测';
                document.querySelectorAll('.option-item').forEach(opt => {
                    opt.style.background = '#f5f5f5';
                    opt.style.borderColor = 'transparent';
                    opt.classList.remove('correct-highlight', 'wrong-highlight', 'disabled');
                });
            }

            function collectAnswers() {
                const answers = [];
                let allAnswered = true;
                currentQuestions.forEach((q, index) => {
                    const selectedRadio = document.querySelector(`input[name="q${index}"]:checked`);
                    if (selectedRadio) {
                        answers.push(parseInt(selectedRadio.value));
                    } else {
                        answers.push(null);
                        allAnswered = false;
                    }
                });
                return { answers, allAnswered };
            }

            function showResults(answers) {
                let correctCount = 0;
                currentQuestions.forEach((q, index) => {
                    const optionsContainer = document.getElementById(`options-${index}`);
                    const optionItems = optionsContainer.querySelectorAll('.option-item');
                    const userAnswer = answers[index];
                    const correctAnswer = q.answer;

                    optionItems.forEach((item, optIndex) => {
                        item.classList.add('disabled');
                        const radio = item.querySelector('input[type="radio"]');
                        if (radio) radio.disabled = true;

                        if (optIndex === correctAnswer) {
                            item.classList.add('correct-highlight');
                            if (!item.querySelector('.feedback-icon')) {
                                const icon = document.createElement('span');
                                icon.className = 'feedback-icon';
                                icon.innerHTML = '✓';
                                icon.style.color = '#2e7d32';
                                item.appendChild(icon);
                            }
                        }
                        if (userAnswer !== null && optIndex === userAnswer && userAnswer !== correctAnswer) {
                            item.classList.add('wrong-highlight');
                            if (!item.querySelector('.feedback-icon')) {
                                const icon = document.createElement('span');
                                icon.className = 'feedback-icon';
                                icon.innerHTML = '✗';
                                icon.style.color = '#c62828';
                                item.appendChild(icon);
                            }
                        }
                    });

                    if (userAnswer === correctAnswer) {
                        correctCount++;
                    }
                });

                const total = currentQuestions.length;
                const accuracy = Math.round((correctCount / total) * 100);

                let layer = '';
                let layerColor = '';
                let suggestion = '';
                if (accuracy < 70) {
                    layer = 'A层 · 基础巩固';
                    layerColor = '#ff9800';
                    suggestion = '建议选择 <span class="layer-tag" style="background:#ffcc80;">A层 基础巩固作业</span>，夯实平均数计算与意义理解。';
                } else if (accuracy >= 70 && accuracy < 90) {
                    layer = 'B层 · 综合提升';
                    layerColor = '#1976d2';
                    suggestion = '建议选择 <span class="layer-tag" style="background:#90caf9; color:#0d47a1;">B层 综合提升作业</span>，加强应用与逆向思维。';
                } else {
                    layer = 'C层 · 拓展探究';
                    layerColor = '#7b1fa2';
                    suggestion = '太棒了！推荐 <span class="layer-tag" style="background:#e1bee7; color:#4a148c;">C层 拓展探究作业</span>，挑战数据侦探与探究课题。';
                }

                resultContainer.innerHTML = `
                    <div class="result-area">
                        <div style="font-size:1.2rem; font-weight:600; color:#2e7d32;">📊 检测结果</div>
                        <div class="score-circle" style="color:${layerColor}; margin:10px 0;">${accuracy}%</div>
                        <div style="font-weight:700; font-size:1.1rem; color:${layerColor};">正确 ${correctCount}/${total} 题</div>
                        <div style="margin-top:10px; font-weight:600; color:#424242;">🏅 对应层级：${layer}</div>
                        <div class="recommendation">
                            📌 ${suggestion}
                        </div>
                        <div style="margin-top:15px; font-size:0.9rem; color:#616161;">
                            💡 请根据推荐层级，在智慧平板上接收对应的课后作业。
                        </div>
                    </div>
                `;
                resultContainer.style.display = 'block';
                submitBtn.innerHTML = '🔄 重新检测';
            }

            submitBtn.addEventListener('click', function() {
                if (isSubmitted) {
                    resetQuiz();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                    return;
                }

                const { answers, allAnswered } = collectAnswers();
                if (!allAnswered) {
                    alert('请完成所有题目再提交哦！🌱');
                    return;
                }

                isSubmitted = true;
                submitBtn.disabled = true;
                showResults(answers);
                submitBtn.disabled = false;
                submitBtn.innerHTML = '🔄 重新检测';
                resultContainer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            });

            refreshBtn.addEventListener('click', function() {
                resetQuiz();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });

            resetQuiz();
        })();
    </script>
</body>
</html>
